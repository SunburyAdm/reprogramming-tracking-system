version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecu-postgres
    environment:
      POSTGRES_USER: ecu_user
      POSTGRES_PASSWORD: ecu_password
      POSTGRES_DB: ecu_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecu_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ecu-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecu-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://ecu_user:ecu_password@postgres:5432/ecu_db
      SECRET_KEY: change-me-in-production-long-random-string
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      MINIO_URL: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      S3_BUCKET: ecu-uploads
      S3_REGION: us-east-1
      API_HOST: 0.0.0.0
      API_PORT: 8000
      ENVIRONMENT: development
      FRONTEND_URL: http://192.168.1.27:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: sh -c "
      sleep 10 &&
      python /app/backend/scripts/init_db.py &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecu-frontend
    environment:
      VITE_API_URL: http://192.168.1.27:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: ./node_modules/.bin/vite --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
  minio_data:

networks:
  default:
    name: ecu-network
